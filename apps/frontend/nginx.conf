server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls (and any WebSocket upgrades) to the backend service.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        set $forwarded_proto $scheme;
        if ($http_x_forwarded_proto) { set $forwarded_proto $http_x_forwarded_proto; }
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # SSE support: disable buffering so EventSource/ReadableStream works.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # SPA history fallback so client-side routes resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
