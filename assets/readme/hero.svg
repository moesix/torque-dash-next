<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="320" viewBox="0 0 1200 320"
     role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">torqueDASH — Self-Hosted OBD-II Vehicle Telemetry Dashboard</title>
  <desc id="hero-desc">A dark-themed hero banner for the torqueDASH project showing the project name, tagline, quick-start command, and a panel of live OBD-II PID data values including RPM, speed, coolant temperature, intake air temperature, and mass air flow.</desc>

  <defs>
    <!-- Background gradient: dark base to slightly lighter -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Bottom accent gradient: teal fade -->
    <linearGradient id="accent-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1abc9c" stop-opacity="0"/>
      <stop offset="20%" stop-color="#1abc9c" stop-opacity="1"/>
      <stop offset="80%" stop-color="#1abc9c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1abc9c" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal tint for docker command box -->
    <linearGradient id="cmd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1abc9c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1abc9c" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e6edf3" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="12" fill="url(#bg-gradient)"/>

  <!-- Subtle grid overlay -->
  <rect width="1200" height="320" rx="12" fill="url(#grid)"/>

  <!-- ======================== -->
  <!-- LEFT SIDE: Title Block   -->
  <!-- ======================== -->
  <g id="title-block" transform="translate(56 48)">

    <!-- Category eyebrow -->
    <text x="0" y="0"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="14" font-weight="500" fill="#1abc9c"
          letter-spacing="2">SELF-HOSTED OBD-II TELEMETRY</text>

    <!-- Project name: "torque" in light + "DASH" in bold teal -->
    <text x="0" y="54"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="56" font-weight="700" fill="#e6edf3">torque</text>
    <text x="232" y="54"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="56" font-weight="800" fill="#1abc9c">DASH</text>

    <!-- Tagline -->
    <text x="0" y="92"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="18" fill="#8b949e">Live vehicle data from Torque Pro. Session replays, route maps, and PID analytics.</text>

    <!-- Quick start command box -->
    <g transform="translate(0 120)">
      <rect width="340" height="40" rx="6" fill="url(#cmd-bg)" stroke="#1abc9c" stroke-opacity="0.25" stroke-width="1"/>
      <text x="16" y="26"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="14" fill="#1abc9c">$ docker compose up -d</text>
    </g>
  </g>

  <!-- ======================== -->
  <!-- RIGHT SIDE: OBD-II Data  -->
  <!-- ======================== -->
  <g id="obdii-display" transform="translate(720 36)">

    <!-- Panel background -->
    <rect x="0" y="0" width="424" height="240" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <!-- Panel header -->
    <text x="20" y="30"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="12" font-weight="600" fill="#8b949e"
          letter-spacing="1">LIVE PID DATA</text>

    <!-- Column headers -->
    <text x="20" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">PID</text>
    <text x="72" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">NAME</text>
    <text x="200" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">VALUE</text>
    <text x="330" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">UNIT</text>

    <!-- Separator line -->
    <line x1="20" y1="62" x2="404" y2="62" stroke="#30363d" stroke-width="1"/>

    <!-- Row 1: 0x0C — RPM -->
    <text x="20" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#1abc9c">0x0C</text>
    <text x="72" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">RPM</text>
    <text x="200" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">2,847</text>
    <text x="330" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">rpm</text>

    <!-- Row 2: 0x0D — Speed -->
    <text x="20" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#1abc9c">0x0D</text>
    <text x="72" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">Speed</text>
    <text x="200" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">98</text>
    <text x="330" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">km/h</text>

    <!-- Row 3: 0x05 — Coolant -->
    <text x="20" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#1abc9c">0x05</text>
    <text x="72" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">Coolant</text>
    <text x="200" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">87°</text>
    <text x="330" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">°C</text>

    <!-- Row 4: 0x0F — Intake Air -->
    <text x="20" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#1abc9c">0x0F</text>
    <text x="72" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">Intake Air</text>
    <text x="200" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">42°</text>
    <text x="330" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">°C</text>

    <!-- Row 5: 0x11 — MAF -->
    <text x="20" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#1abc9c">0x11</text>
    <text x="72" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">MAF</text>
    <text x="200" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">18.4</text>
    <text x="330" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">g/s</text>

    <!-- Separator before badges -->
    <line x1="20" y1="210" x2="404" y2="210" stroke="#30363d" stroke-width="1"/>

    <!-- Tech badges -->
    <g transform="translate(20 220)">
      <!-- TimescaleDB badge -->
      <rect width="112" height="22" rx="4" fill="#1abc9c" fill-opacity="0.1" stroke="#1abc9c" stroke-opacity="0.3" stroke-width="1"/>
      <text x="56" y="15"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" font-weight="500" fill="#1abc9c"
            text-anchor="middle">TimescaleDB</text>

      <!-- Docker badge -->
      <g transform="translate(124 0)">
        <rect width="72" height="22" rx="4" fill="#1abc9c" fill-opacity="0.1" stroke="#1abc9c" stroke-opacity="0.3" stroke-width="1"/>
        <text x="36" y="15"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" font-weight="500" fill="#1abc9c"
              text-anchor="middle">Docker</text>
      </g>
    </g>
  </g>

  <!-- ======================== -->
  <!-- BOTTOM: Accent Line      -->
  <!-- ======================== -->
  <rect x="0" y="316" width="1200" height="4" rx="0" fill="url(#accent-gradient)"/>
</svg>
