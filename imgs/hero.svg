<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="320" viewBox="0 0 1200 320"
     role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">torqueDASH-Next — Self-Hosted OBD-II Vehicle Telemetry Dashboard</title>
  <desc id="hero-desc">A dark-themed hero banner for the torqueDASH-Next project showing the project name, tagline, quick-start Docker command, and a panel of live OBD-II PID data values including RPM, speed, coolant temperature, intake air temperature, and mass air flow.</desc>

  <defs>
    <!-- Background gradient: dark base to slightly lighter -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Bottom accent gradient: project teal fade -->
    <linearGradient id="accent-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#009999" stop-opacity="0"/>
      <stop offset="20%" stop-color="#009999" stop-opacity="1"/>
      <stop offset="80%" stop-color="#009999" stop-opacity="1"/>
      <stop offset="100%" stop-color="#009999" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal tint for docker command box -->
    <linearGradient id="cmd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#009999" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#009999" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e6edf3" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="12" fill="url(#bg-gradient)"/>

  <!-- Subtle grid overlay -->
  <rect width="1200" height="320" rx="12" fill="url(#grid)"/>

  <!-- ======================== -->
  <!-- LEFT SIDE: Title Block   -->
  <!-- ======================== -->
  <g id="title-block" transform="translate(56 48)">

    <!-- Category eyebrow -->
    <text x="0" y="0"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="14" font-weight="500" fill="#009999"
          letter-spacing="2">SELF-HOSTED OBD-II TELEMETRY</text>

    <!-- Project name: "torque" in light + "DASH" in bold teal + "-Next" in muted -->
    <text x="0" y="54"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="56"><tspan font-weight="700" fill="#e6edf3">torque</tspan><tspan font-weight="800" fill="#009999">DASH</tspan><tspan font-weight="600" fill="#8b949e">-Next</tspan></text>

    <!-- Tagline -->
    <text x="0" y="92"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="18" fill="#8b949e">Live vehicle data from Torque Pro. Session replays, route maps, and PID analytics.</text>

    <!-- Quick start command box -->
    <g transform="translate(0 120)">
      <rect width="340" height="40" rx="6" fill="url(#cmd-bg)" stroke="#009999" stroke-opacity="0.25" stroke-width="1"/>
      <text x="16" y="26"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="14" fill="#009999">$ docker compose up -d</text>
    </g>

    <!-- AI Provider badges — row 1 -->
    <g transform="translate(0 176)">

      <!-- OpenAI badge -->
      <g transform="translate(0 0)">
        <rect width="120" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <g transform="translate(10 7)">
          <path d="M9 0C4.03 0 0 4.03 0 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 3.24c1.22 0 2.3.5 3.1 1.3L9 7.63 5.9 4.54c.8-.8 1.88-1.3 3.1-1.3zM3.24 9c0-1.22.5-2.3 1.3-3.1L7.63 9l-3.09 3.09c-.8-.8-1.3-1.88-1.3-3.1zm5.76 9c-1.22 0-2.3-.5-3.1-1.3L9 10.37l3.09 3.09c-.8.8-1.88 1.3-3.1 1.3zm0-3.24c-1.22 0-2.3-.5-3.1-1.3L9 7.11l3.09 3.09c-.8.8-1.88 1.3-3.1 1.3z" fill="#10a37f" opacity="0.9"/>
        </g>
        <text x="36" y="21"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" font-weight="600" fill="#e6edf3">OpenAI</text>
      </g>

      <!-- Anthropic badge -->
      <g transform="translate(132 0)">
        <rect width="120" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <g transform="translate(10 7)">
          <path d="M9 0L0 18h3.6l1.8-3.6h7.2L14.4 18H18L9 0zm0 5.4l2.7 5.4H6.3L9 5.4z" fill="#d4a574" opacity="0.9"/>
        </g>
        <text x="36" y="21"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" font-weight="600" fill="#e6edf3">Anthropic</text>
      </g>

      <!-- DeepSeek badge -->
      <g transform="translate(264 0)">
        <rect width="120" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <g transform="translate(10 7)">
          <circle cx="9" cy="9" r="8" fill="none" stroke="#4dabf7" stroke-width="1.5" opacity="0.9"/>
          <text x="9" y="13" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#4dabf7" text-anchor="middle">DS</text>
        </g>
        <text x="36" y="21"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" font-weight="600" fill="#e6edf3">DeepSeek</text>
      </g>
    </g>

    <!-- AI Provider badges — row 2 -->
    <g transform="translate(0 216)">

      <!-- Ollama badge -->
      <g transform="translate(0 0)">
        <rect width="120" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <g transform="translate(10 7)">
          <circle cx="9" cy="9" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
          <path d="M7 5.5l5 3.5-5 3.5z" fill="#a78bfa" opacity="0.9"/>
        </g>
        <text x="36" y="21"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" font-weight="600" fill="#e6edf3">Ollama</text>
      </g>

      <!-- Custom AI badge -->
      <g transform="translate(132 0)">
        <rect width="120" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <g transform="translate(10 7)">
          <circle cx="9" cy="9" r="8" fill="none" stroke="#8b949e" stroke-width="1.5" opacity="0.9"/>
          <text x="9" y="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#8b949e" text-anchor="middle">{ }</text>
        </g>
        <text x="36" y="21"
              font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" font-weight="600" fill="#e6edf3">Custom AI</text>
      </g>
    </g>
  </g>

  <!-- ======================== -->
  <!-- RIGHT SIDE: OBD-II Data  -->
  <!-- ======================== -->
  <g id="obdii-display" transform="translate(720 36)">

    <!-- Panel background -->
    <rect x="0" y="0" width="424" height="268" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <!-- Panel header -->
    <text x="20" y="30"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="12" font-weight="600" fill="#8b949e"
          letter-spacing="1">LIVE PID DATA</text>

    <!-- Column headers -->
    <text x="20" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">PID</text>
    <text x="72" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">NAME</text>
    <text x="200" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">VALUE</text>
    <text x="330" y="54"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8b949e">UNIT</text>

    <!-- Separator line -->
    <line x1="20" y1="62" x2="404" y2="62" stroke="#30363d" stroke-width="1"/>

    <!-- Row 1: 0x0C — RPM -->
    <text x="20" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#009999">0x0C</text>
    <text x="72" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">RPM</text>
    <text x="200" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">2,847</text>
    <text x="330" y="84"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">rpm</text>

    <!-- Row 2: 0x0D — Speed -->
    <text x="20" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#009999">0x0D</text>
    <text x="72" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">Speed</text>
    <text x="200" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">98</text>
    <text x="330" y="112"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">km/h</text>

    <!-- Row 3: 0x05 — Coolant -->
    <text x="20" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#009999">0x05</text>
    <text x="72" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">Coolant</text>
    <text x="200" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">87°</text>
    <text x="330" y="140"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">°C</text>

    <!-- Row 4: 0x0F — Intake Air -->
    <text x="20" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#009999">0x0F</text>
    <text x="72" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">Intake Air</text>
    <text x="200" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">42°</text>
    <text x="330" y="168"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">°C</text>

    <!-- Row 5: 0x11 — MAF -->
    <text x="20" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" font-weight="600" fill="#009999">0x11</text>
    <text x="72" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e6edf3">MAF</text>
    <text x="200" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15" font-weight="700" fill="#e6edf3">18.4</text>
    <text x="330" y="196"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e">g/s</text>

    <!-- Separator before badges -->
    <line x1="20" y1="210" x2="404" y2="210" stroke="#30363d" stroke-width="1"/>

    <!-- Tech badges -->
    <g transform="translate(20 220)">
      <!-- TimescaleDB badge -->
      <rect width="112" height="28" rx="4" fill="#009999" fill-opacity="0.1" stroke="#009999" stroke-opacity="0.3" stroke-width="1"/>
      <text x="56" y="19"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" font-weight="500" fill="#009999"
            text-anchor="middle">TimescaleDB</text>

      <!-- Docker badge -->
      <g transform="translate(124 0)">
        <rect width="80" height="28" rx="4" fill="#009999" fill-opacity="0.1" stroke="#009999" stroke-opacity="0.3" stroke-width="1"/>
        <text x="40" y="19"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" font-weight="500" fill="#009999"
              text-anchor="middle">Docker</text>
      </g>

      <!-- React badge -->
      <g transform="translate(216 0)">
        <rect width="68" height="28" rx="4" fill="#009999" fill-opacity="0.1" stroke="#009999" stroke-opacity="0.3" stroke-width="1"/>
        <text x="34" y="19"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" font-weight="500" fill="#009999"
              text-anchor="middle">React</text>
      </g>
    </g>
  </g>

  <!-- ======================== -->
  <!-- BOTTOM: Accent Line      -->
  <!-- ======================== -->
  <rect x="0" y="316" width="1200" height="4" rx="0" fill="url(#accent-gradient)"/>
</svg>
