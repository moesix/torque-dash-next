services:
  db:
    image: timescale/timescaledb:2.15.3-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-torquedash}
      POSTGRES_USER: ${POSTGRES_USER:-torquedash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-torquedash} -d ${POSTGRES_DB:-torquedash}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-torquedash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-torquedash}
      PORT: "3000"
      SESSION_KEYS: ${SESSION_KEYS:?Error: SESSION_KEYS must be set in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      UPLOAD_RATE_LIMIT_MAX: ${UPLOAD_RATE_LIMIT_MAX:-600}
      UPLOAD_RATE_LIMIT_WINDOW_MS: ${UPLOAD_RATE_LIMIT_WINDOW_MS:-60000}
      UPLOAD_API_TOKEN: ${UPLOAD_API_TOKEN:-}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      WRITE_RATE_LIMIT_MAX: ${WRITE_RATE_LIMIT_MAX:-30}
      WRITE_RATE_LIMIT_WINDOW_MS: ${WRITE_RATE_LIMIT_WINDOW_MS:-60000}
      READ_RATE_LIMIT_MAX: ${READ_RATE_LIMIT_MAX:-600}
      READ_RATE_LIMIT_WINDOW_MS: ${READ_RATE_LIMIT_WINDOW_MS:-60000}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      TZ: UTC
    ports:
      - "3000:3000"

  frontend:
    build: ./apps/frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"

volumes:
  pgdata:
