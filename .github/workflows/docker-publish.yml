name: Build and Publish Docker Images

on:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
  push:
    tags: ['v*']
  workflow_dispatch:

# Cancel in-progress runs for the same branch — saves runner minutes.
concurrency:
  group: docker-build-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only run when version-bump succeeded, or on manual/tag triggers
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            context: .
            image-suffix: -backend
          - name: frontend
            context: ./apps/frontend
            image-suffix: -frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # For workflow_run triggers: checkout the commit that version-bump pushed
          # (which has the bumped version in package.json). For tag/manual triggers:
          # checkout the default ref.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image-suffix }}
          tags: |
            type=sha
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
