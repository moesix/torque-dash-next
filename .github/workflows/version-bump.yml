name: Version Bump

on:
  push:
    branches: [master]

# ── INFINITE LOOP PREVENTION ────────────────────────────────────
# The workflow checks if the triggering commit starts with
# "chore: release" and skips itself.
# ────────────────────────────────────────────────────────────────

# ── GITHUB_TOKEN LIMITATION ─────────────────────────────────────
# Pushes made with GITHUB_TOKEN do NOT trigger downstream
# workflows. Instead of using a PAT, docker-publish.yml uses a
# workflow_run trigger on "Version Bump" completion, which
# bypasses the GITHUB_TOKEN limitation entirely.
# See: https://docs.github.com/en/actions/security-guides/
#      automatic-token-authentication#using-the-github_token
# ────────────────────────────────────────────────────────────────

jobs:
  version-bump:
    runs-on: ubuntu-latest
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: release') }}"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history for commit message analysis

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Determine version bump
        id: bump
        run: |
          # Analyze commits since last tag (includes body for BREAKING CHANGE detection)
          # If no tags exist yet, tag current version as v1.0.0 (first release)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}"..HEAD --format="%s%n%b")
          else
            echo "No existing tags found — first release, tagging current version"
            CURRENT=$(node -p "require('./package.json').version")
            echo "bump=none" >> $GITHUB_OUTPUT
            echo "initial_tag=v${CURRENT}" >> $GITHUB_OUTPUT
          fi

          # Determine bump type from conventional commits (only if not already set)
          if ! grep -q 'bump=' $GITHUB_OUTPUT 2>/dev/null; then
            # Major: any type with ! (feat!, fix!, refactor!, etc.) or BREAKING CHANGE: in body
            if echo "$COMMITS" | grep -qE "^\S+!|BREAKING CHANGE:"; then
              echo "bump=major" >> $GITHUB_OUTPUT
            elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
              echo "bump=minor" >> $GITHUB_OUTPUT
            else
              echo "bump=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Bump version
        id: version
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"
          INITIAL_TAG="${{ steps.bump.outputs.initial_tag }}"

          if [ "$BUMP" = "none" ]; then
            # First release — tag current version without bumping
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
            git push origin master --follow-tags
          else
            # Install deps to keep package-lock.json pristine
            npm ci

            # Use npm version to bump package.json and package-lock.json
            npm version $BUMP --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

            # Commit and tag (annotated tag so --follow-tags pushes it)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json
            git commit -m "chore: release v${NEW_VERSION}"
            git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
            # Push commit and tag (GITHUB_TOKEN is fine; docker-publish uses workflow_run trigger)
            git push origin master --follow-tags
          fi

      # ── Outputs for downstream workflows (docker-publish.yml) ──
      - name: Output version and commit SHA
        id: output
        run: |
          echo "version=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
